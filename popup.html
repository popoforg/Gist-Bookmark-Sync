<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Gist Bookmark Sync</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>📑 书签同步</h1>
    
    <div id="status" class="status"></div>
    
    <div class="section">
      <h2>⚙️ 配置</h2>
      
      <div class="form-group">
        <label for="githubToken">GitHub Token:</label>
        <div class="input-with-buttons">
          <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
          <button id="saveToken" class="btn btn-small">保存</button>
          <button id="testConnection" class="btn btn-small btn-secondary">测试连接</button>
        </div>
      </div>
      
      <div class="form-group">
        <label for="gistId">Gist ID:</label>
        <input type="text" id="gistId" placeholder="例如：a1b2c3d4e5f6...">
      </div>
      
      <div class="form-group">
        <label for="filename">文件名:</label>
        <input type="text" id="filename" placeholder="bookmarks.json" value="bookmarks.json">
      </div>
    </div>
    
    <div class="section">
      <h2>🔄 同步操作</h2>
      
      <div class="button-group">
        <button id="uploadBtn" class="btn btn-primary">
          ⬆️ 上传到 Gist
        </button>
        <button id="downloadBtn" class="btn btn-success">
          ⬇️ 从 Gist 下载
        </button>
      </div>
      
      <div class="button-group">
        <button id="clearBtn" class="btn btn-danger">
          🗑️ 清空书签栏
        </button>
      </div>
    </div>
    
    <div class="section">
      <h2>ℹ️ 使用说明</h2>
      <ol class="help-text">
        <li>创建 <a href="https://github.com/settings/tokens" target="_blank">GitHub Personal Access Token</a>（需要 gist 权限）</li>
        <li>输入 Token 并保存</li>
        <li>输入 Gist ID（可留空，上传时会自动创建）</li>
        <li>点击"上传到 Gist"将本地书签上传</li>
        <li>点击"从 Gist 下载"将 Gist 书签同步到本地</li>
      </ol>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
